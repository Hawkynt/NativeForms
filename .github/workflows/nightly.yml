name: Nightly

# Fires automatically after CI passes on main/master. A red CI run never produces
# a nightly, so the "latest nightly" always points at tested code. Builds the
# exact SHA CI validated (not branch tip). Does NOT push to NuGet.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    # `main` is the canonical default branch; `master` is accepted only while
    # a repo's rename is pending (STANDARD.md §2, rollout step 0).
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly
  cancel-in-progress: true

# Force JavaScript-based actions to run on Node 24 instead of the deprecated Node 20 ahead of
# the 2026-06-16 hard cutover, until we bump each action to a Node-24-native major version.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/_build.yml
    with:
      ref: ${{ github.event.workflow_run.head_sha || github.ref }}

  benchmark:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      # The harness asserts the PRD §4 regression thresholds itself (construction byte budgets with
      # 2x headroom, zero steady-state paint allocation) and exits non-zero on a regression — the
      # pipefail keeps that exit code visible through the tee.
      - name: Run benchmark harness (JSON lines + table)
        run: |
          set -o pipefail
          dotnet run --project NativeForms.Benchmarks -c Release | tee benchmark-results.txt
      - name: Publish benchmark step summary
        if: always()
        run: |
          echo "### Benchmark results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat benchmark-results.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.txt

  trim:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install NativeAOT prerequisites
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev
      # The probe references every backend assembly but registers only GtkBackend, so a trimmed
      # publish proves the §4 promise: only the registered backend is linked.
      - name: Publish TrimProbe trimmed (assembly-per-file, so the linked set is inspectable)
        run: >
          dotnet publish NativeForms.TrimProbe/NativeForms.TrimProbe.csproj
          --configuration Release --runtime linux-x64 --self-contained
          -p:PublishTrimmed=true -p:TreatWarningsAsErrors=true
          -o trim-out
      - name: Assert only the registered backend survived trimming
        run: |
          ls -l trim-out
          test -f trim-out/Hawkynt.NativeForms.Backends.Gtk.dll || { echo "registered GTK backend missing from output"; exit 1; }
          for unregistered in Windows MacOS; do
            if [ -e "trim-out/Hawkynt.NativeForms.Backends.$unregistered.dll" ]; then
              echo "unregistered $unregistered backend assembly survived trimming"; exit 1
            fi
          done
      # The same probe through NativeAOT, sized against the all-backends demo binary from CI.
      - name: Publish TrimProbe with NativeAOT and report the size
        run: |
          dotnet publish NativeForms.TrimProbe/NativeForms.TrimProbe.csproj \
            --configuration Release --runtime linux-x64 --self-contained \
            -p:PublishAot=true -p:TreatWarningsAsErrors=true \
            -o aot-out
          echo "### TrimProbe size (single backend, linux-x64)" >> "$GITHUB_STEP_SUMMARY"
          echo "Trimmed publish (per-assembly):" >> "$GITHUB_STEP_SUMMARY"
          ls -lh trim-out | awk '{print $5, $NF}' >> "$GITHUB_STEP_SUMMARY"
          echo "NativeAOT binary:" >> "$GITHUB_STEP_SUMMARY"
          ls -lh aot-out/Hawkynt.NativeForms.TrimProbe* 2>/dev/null | awk '{print $5, $NF}' >> "$GITHUB_STEP_SUMMARY" || true

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0                         # update-changelog.mjs reads git log
      - name: Compute nightly tag
        run: echo "TAG=nightly-$(date -u +%Y%m%d)" >> "$GITHUB_ENV"
      - uses: actions/download-artifact@v4
        with:
          name: app-artifacts
          path: dist
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # --notes-only: CHANGELOG.md is committed by release.yml exclusively;
      # writing it here would be silently discarded with the runner workspace.
      - name: Generate release notes (functional changes, bucketed by + - * # !)
        run: node .github/workflows/scripts/update-changelog.mjs --nightly --notes-only --notes RELEASE_NOTES.md

      # Same-day re-run: drop the existing nightly release AND its tag first.
      # Reusing the tag would leave it pinned at the morning's SHA while the
      # assets get replaced — the tag must point at the SHA that was actually
      # built, or the next day's delta starts from the wrong commit.
      - name: Replace same-day nightly (release + tag), if any
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete "$TAG" --cleanup-tag --yes || true
      - name: Publish nightly prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          target_commitish: ${{ github.event.workflow_run.head_sha || github.sha }}
          prerelease: true
          files: dist/*
          body_path: RELEASE_NOTES.md            # commit-message changelog, not GitHub's PR notes

  prune:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: GFS prune of old nightlies (7 daily + 4 weekly + 3 monthly)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/workflows/scripts/prune-nightlies.mjs
